# yaml-language-server: $schema=https://raw.githubusercontent.com/typeddjango/pytest-mypy-plugins/master/pytest_mypy_plugins/schema.json

# =============================================================================
# Static type tests for LibraryBoundary.wrap() — _T -> _T preservation
# =============================================================================

- case: wrap_preserves_class_type
  mypy_config: &mypy_config |
    [mypy]
    python_version = 3.13
    strict = true
  main: |
    from cc_lib.library_boundary import LibraryBoundary

    class MyError(Exception): ...

    class MyDB:
        def query(self) -> list[str]:
            return []

    db = LibraryBoundary(MyError).wrap(MyDB())
    reveal_type(db)  # N: Revealed type is "main.MyDB"
    reveal_type(db.query())  # N: Revealed type is "builtins.list[builtins.str]"

- case: wrap_preserves_module_type
  mypy_config: *mypy_config
  env:
    - MYPYPATH=stubs
  main: |
    import bashlex
    from cc_lib.library_boundary import LibraryBoundary

    class MyError(Exception): ...

    wrapped = LibraryBoundary(MyError).wrap(bashlex)
    reveal_type(wrapped)  # N: Revealed type is "types.ModuleType"
    # Attribute access on a ModuleType variable (not the import name) goes through __getattr__ → Any
    reveal_type(wrapped.parse)  # N: Revealed type is "Any"

- case: wrap_reassign_preserves_module_stubs
  mypy_config: *mypy_config
  env:
    - MYPYPATH=stubs
  main: |
    import bashlex
    from cc_lib.library_boundary import LibraryBoundary

    class MyError(Exception): ...

    bashlex = LibraryBoundary(MyError).wrap(bashlex)
    reveal_type(bashlex.parse)  # N: Revealed type is "def (s: builtins.str) -> builtins.list[bashlex.ast.node]"